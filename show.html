<!DOCTYPE html>
<html lang="pl">
<head>
    <title>mObywatel</title>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="assets/app/main.css">
    <link rel="stylesheet" href="assets/app/flow.css">
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="shortcut icon" href="images/logo.png">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="bottom_bar">
        <div class="bottom_bar_grid">
            <div class="bottom_element_grid" send="documents">
                <div class="bottom_element_image documents_open"></div>
                <p class="bottom_element_text open">Dokumenty</p>
            </div>
            <div class="bottom_element_grid" send="services">
                <div class="bottom_element_image services"></div>
                <p class="bottom_element_text">Usługi</p>
            </div>
            <div class="bottom_element_grid" send="qr">
                <div class="bottom_element_image qr"></div>
                <p class="bottom_element_text">Kod QR</p>
            </div>
            <div class="bottom_element_grid" send="more">
                <div class="bottom_element_image more"></div>
                <p class="bottom_element_text">Więcej</p>
            </div>
        </div>
    </div>

    <div class="top_slide_bar">
        <img class="main_page_logo" src="images/logo_large.png">
        <p class="main_title">Dokumenty</p>
    </div>

    <div class="container">
        <div class="services_list" style="margin-top: 10px;">
            <div class="service" onclick="sendTo('card')">
                <img class="service_icon" src="images/identity.png">
                <p class="service_name">mDowód</p>
                <img class="arrow" src="images/right_arrow_sharp.png">
            </div>
            <div class="service" style="border: none;">
                <img class="service_icon" src="images/passport.png">
                <p class="service_name">Paszport</p>
                <img class="arrow" src="images/right_arrow_sharp.png">
            </div>
            <div class="service" style="border: none;">
                <img class="service_icon" src="images/driver.png">
                <p class="service_name">Prawo jazdy</p>
                <img class="arrow" src="images/right_arrow_sharp.png">
            </div>
            <div class="service" style="border: none;">
                <img class="service_icon" src="images/certificates.png">
                <p class="service_name">Certyfikaty</p>
                <img class="arrow" src="images/right_arrow_sharp.png">
            </div>
        </div>
    </div>

    <script src="assets/app/bar.js"></script>
    <script src="assets/app/manifest.js"></script>
    <script src="assets/cache.js"></script>
    <script src="assets/app/flow.js"></script>
</body>
</html>
